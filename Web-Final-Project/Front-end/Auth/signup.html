<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sign up &bull; Style Hub</title>

    <!-- Favicon Image -->

    <!-- iOS (iPhone/iPad) Home Screen Icon -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/Images/Favicon/apple-touch-icon.png"
    />
    <!-- Standard favicon for most modern desktop browsers (tabs, address bar) -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/Images/Favicon/favicon-32x32.png"
    />
    <!-- Legacy small favicon (older browsers, bookmarks) -->
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/Images/Favicon/favicon-16x16.png"
    />
    <!-- Android Chrome / Progressive Web App (PWA) home screen icon -->
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="/Images/Favicon/android-chrome-192x192.png"
    />
    <!-- Larger Android / PWA icon (for higher resolution screens) -->
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="/Images/Favicon/android-chrome-512x512.png"
    />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../styles/styles.css" />
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #f8f9fa;
      }
      .auth-container {
        max-width: 400px;
        margin: 50px auto;
        padding: 30px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
      }
      .form-control:focus {
        border-color: #0d6efd;
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
      }
      .btn-primary {
        width: 100%;
        padding: 10px;
        font-weight: 600;
      }
      .form-text a {
        text-decoration: none;
      }
      .password-requirements {
        font-size: 0.8rem;
        color: #6c757d;
        margin-top: 5px;
      }
    </style>
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
      <div class="col-auto" style="margin-left: 110px">
        <a href="#" class="text-decoration-none">
          <h1 class="h4 mb-0">Style Hub</h1>
        </a>
      </div>
    </nav>

    <!-- Signup Form -->
    <div class="container">
      <div class="auth-container">
        <h2 class="text-center mb-4">Create an Account</h2>
        <p class="text-center text-muted mb-4">
          Join Style Hub for the best shopping experience
        </p>

        <form id="signupForm">
          <div class="mb-3">
            <label for="fullName" class="form-label">Full Name</label>
            <input type="text" class="form-control" id="fullName" required />
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Email address</label>
            <input type="email" class="form-control" id="email" required />
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input
              type="password"
              class="form-control"
              id="password"
              required
            />
            <div class="password-requirements">
              Must be at least 8 characters long and include a number
            </div>
          </div>
          <div class="mb-4">
            <label for="confirmPassword" class="form-label"
              >Confirm Password</label
            >
            <input
              type="password"
              class="form-control"
              id="confirmPassword"
              required
            />
          </div>
          <div class="form-check mb-4">
            <input
              class="form-check-input"
              type="checkbox"
              id="terms"
              required
            />
            <label class="form-check-label" for="terms">
              I agree to the
              <a href="../Documentation/terms.html" class="text-primary"
                >Terms of Service</a
              >
              and
              <a href="../Documentation/privacy.html" class="text-primary"
                >Privacy Policy</a
              >
            </label>
          </div>
          <button type="submit" class="btn btn-primary mb-3">
            Create Account
          </button>
          <p class="text-center mt-3">
            Already have an account?
            <a href="login.html" class="text-primary">Login</a>
          </p>
        </form>
      </div>
    </div>

    <!-- Footer -->
    <footer class="bg-light text-center text-lg-start mt-5">
      <div
        class="text-center p-3"
        style="background-color: rgba(0, 0, 0, 0.05)"
      >
        © 2025 Style Hub. All rights reserved.
      </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
